<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Consti.garage</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#123a70">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Consti.garage">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">🅿️</div>
      <h1>Consti.garage</h1>
      <p class="login-sub">Ingresá para ver el dashboard</p>
      <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
      <button id="login-btn" class="btn-primary">Entrar</button>
      <div id="login-error"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="shell">

      <aside class="sidebar">
        <div class="brand">
          <span class="brand-icon">🅿️</span>
          <span class="brand-name">Consti.garage</span>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-page="resumen"><span class="icon">📊</span><span>Resumen</span></button>
          <button class="nav-item" data-page="ingresos"><span class="icon">💳</span><span>Ingresos</span></button>
          <button class="nav-item" data-page="gastos"><span class="icon">🧾</span><span>Gastos</span></button>
          <button class="nav-item" data-page="cocheras"><span class="icon">🅿️</span><span>Cocheras</span><span class="badge-count cocheras-badge hidden">0</span></button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="titulo-pagina">Resumen</h1>
            <p class="subtitle" id="subtitulo-pagina">Así viene el mes</p>
          </div>
          <div class="mes-selector">
            <button id="mes-prev" aria-label="Mes anterior">‹</button>
            <span id="mes-label">—</span>
            <button id="mes-next" aria-label="Mes siguiente">›</button>
          </div>
        </header>

        <div id="error-banner" class="error-banner hidden">
          <span>No se pudo cargar. Revisá tu conexión.</span>
          <button id="error-retry">Reintentar</button>
        </div>

        <!-- ── Resumen ─────────────────────────────────────────────────── -->
        <section id="page-resumen" class="page">
          <div class="hero">
            <div class="label">Ganancia del mes</div>
            <div class="value" id="hero-ganancia">—</div>
          </div>

          <div class="tiles">
            <div class="tile">
              <div class="label">Ingreso bruto</div>
              <div class="value" id="tile-ingreso-bruto">—</div>
            </div>
            <div class="tile">
              <div class="label">Ingreso neto</div>
              <div class="value" id="tile-ingreso-neto">—</div>
            </div>
            <div class="tile">
              <div class="label">Transferencias + MP</div>
              <div class="value" id="tile-transferencias">—</div>
            </div>
            <div class="tile">
              <div class="label">Efectivo</div>
              <div class="value" id="tile-efectivo">—</div>
            </div>
            <div class="tile">
              <div class="label">Gastos</div>
              <div class="value" id="tile-gastos">—</div>
            </div>
          </div>

          <div class="card">
            <h2>Rendición a socios</h2>
            <div class="meter-track">
              <div class="meter-fill" id="meter-fill" style="width: 0%"></div>
            </div>
            <div class="meter-caption">
              <span id="meter-entregado">—</span>
              <span id="meter-objetivo">—</span>
            </div>
            <div class="badge-warning hidden" id="badge-deuda">
              <span class="icon">⚠</span>
              <span id="badge-deuda-texto"></span>
            </div>
          </div>

          <div class="card card-link" data-page="cocheras">
            <h2>Cocheras</h2>
            <div class="cocheras-resumen">
              <span class="num" id="resumen-cocheras-cobradas">—</span>
              <span class="de" id="resumen-cocheras-total">de — cobradas</span>
            </div>
            <span class="ver-mas">Ver detalle →</span>
          </div>
        </section>

        <!-- ── Ingresos ────────────────────────────────────────────────── -->
        <section id="page-ingresos" class="page hidden">
          <div class="filtros">
            <div class="chips" id="chips-tipo-pago">
              <button class="chip active" data-value="TODOS">Todos</button>
              <button class="chip" data-value="Efectivo">Efectivo</button>
              <button class="chip" data-value="Transferencia">Transferencia</button>
              <button class="chip" data-value="Mercado Pago">Mercado Pago</button>
            </div>
            <input type="text" id="buscar-ingresos" placeholder="Buscar por nombre o cochera…">
          </div>
          <div id="ingresos-lista"></div>
        </section>

        <!-- ── Gastos ──────────────────────────────────────────────────── -->
        <section id="page-gastos" class="page hidden">
          <div class="filtros">
            <input type="text" id="buscar-gastos" placeholder="Buscar por categoría o descripción…">
          </div>
          <div id="gastos-lista"></div>
        </section>

        <!-- ── Cocheras ────────────────────────────────────────────────── -->
        <section id="page-cocheras" class="page hidden">
          <div class="filtros">
            <div class="chips" id="chips-estado-cochera">
              <button class="chip active" data-value="TODAS">Todas</button>
              <button class="chip" data-value="PENDIENTES">Pendientes</button>
              <button class="chip" data-value="COBRADAS">Cobradas</button>
            </div>
            <div class="chips" id="chips-tipo-cochera">
              <button class="chip active" data-value="TODOS">Todos</button>
              <button class="chip" data-value="auto">Autos</button>
              <button class="chip" data-value="moto">Motos</button>
            </div>
            <input type="text" id="buscar-cocheras" placeholder="Buscar por nombre o número…">
          </div>
          <div id="cocheras-sin-identificar" class="aviso-sin-identificar hidden"></div>
          <div id="cocheras-lista"></div>
        </section>
      </main>
    </div>

    <nav class="bottom-tabs">
      <button class="tab-item active" data-page="resumen"><span class="icon">📊</span><span>Resumen</span></button>
      <button class="tab-item" data-page="ingresos"><span class="icon">💳</span><span>Ingresos</span></button>
      <button class="tab-item" data-page="gastos"><span class="icon">🧾</span><span>Gastos</span></button>
      <button class="tab-item" data-page="cocheras"><span class="icon">🅿️</span><span>Cocheras</span><span class="badge-count cocheras-badge hidden">0</span></button>
    </nav>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
